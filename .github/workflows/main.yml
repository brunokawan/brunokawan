name: generate animation

on:
  # rodar automaticamente a cada 24 horas
  schedule:
    - cron: "0 */24 * * *" 
  
  # permite rodar manualmente a qualquer momento
  workflow_dispatch:
  
  # rodar a cada push no branch main
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # gera o jogo da cobrinha a partir das contribuições do usuário
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: brunokawan
          # AQUI ESTÁ A MÁGICA: Definindo a paleta de cores para verde
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#2ea043&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#2ea043&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # envia o conteúdo de <build_dir> para um branch chamado 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
